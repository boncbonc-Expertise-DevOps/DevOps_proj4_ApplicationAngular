apiVersion: apps/v1
kind: Deployment
metadata:
  name: olympic-games-app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: olympic-games-app
  template:
    metadata:
      labels:
        app: olympic-games-app
    spec:
      containers:
      - name: olympic-games-app
        image: registry.gitlab.com/boncbonc-devops/proj4/devops_proj4_applicationangular:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
      imagePullSecrets:
      - name: gitlab-registry-secret
